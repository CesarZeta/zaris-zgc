# Deploy del frontend (web-app) a GitHub Pages.
# Requiere: Settings → Pages → Source = "GitHub Actions", y la variable de
# repositorio API_URL apuntando al backend (ej: https://api.../api/v1).
name: Deploy frontend a GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "web-app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-app/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: /zaris-zgc/
          VITE_API_URL: ${{ vars.API_URL }}
      # SPA con BrowserRouter: Pages sirve 404.html en rutas profundas
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
